name: VeyraQuant Brief And Alerts

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without sending email or updating state"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: veyraquant-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall report.py veyraquant

      - name: Run report
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          SYMBOLS: "NVDA,MSFT,AMD,SMH,QQQ"
          MARKET_SYMBOLS: "SPY,QQQ,SMH,^VIX"
          SEND_HOUR: "7"
          SEND_MINUTE: "30"
          SEND_WINDOW_MINUTES: "10"
          ENABLE_ENTRY_ALERTS: "true"
          ALERT_COOLDOWN_HOURS: "12"
          ALERT_SCORE_THRESHOLD: "65"
          SOCIAL_SENTIMENT_THRESHOLD: "0.15"
          INTRADAY_INTERVAL: "30m"
          RISK_PER_TRADE_PCT: "0.5"
          MAX_POSITION_PCT: "10"
          PORTFOLIO_HEAT_MAX_PCT: "3"
          ATR_STOP_MULTIPLIER: "2.0"
          MIN_RR: "1.5"
          SUBJECT_PREFIX: "VeyraQuant 量化简报"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python report.py

      - name: Commit state if updated
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain state/last_sent.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/last_sent.json
            git commit -m "Update last_sent state"
            git push
          else
            echo "No state changes to commit."
          fi
